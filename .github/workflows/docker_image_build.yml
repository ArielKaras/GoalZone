name: Docker Image CI

on:
  push:
    branches: [ "Test" ]
  pull_request:
    branches: [ "Test" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: docker build . --file landing_page/build/Landing_page.Dockerfile --tag landing_page:$(date +%s)
